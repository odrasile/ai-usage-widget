name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build installers (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x64
            os: ubuntu-latest
            arch: x64
          - name: windows-x64
            os: windows-latest
            arch: x64
          - name: macos-arm64
            os: macos-15
            arch: arm64
          - name: macos-intel
            os: macos-15-intel
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build Tauri bundle
        run: npm run tauri:build

      - name: Add macOS architecture suffix
        if: runner.os == 'macOS'
        env:
          ARCH_SUFFIX: ${{ matrix.arch }}
        run: |
          for file in src-tauri/target/release/bundle/dmg/*.dmg; do
            [ -e "$file" ] || continue
            mv "$file" "${file%.dmg}-${ARCH_SUFFIX}.dmg"
          done

          for file in src-tauri/target/release/bundle/macos/*.app.tar.gz; do
            [ -e "$file" ] || continue
            mv "$file" "${file%.app.tar.gz}-${ARCH_SUFFIX}.app.tar.gz"
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
          fail_on_unmatched_files: false
